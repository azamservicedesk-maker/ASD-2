kind = "web"
previewPath = "/"
title = "Azam Service Desk"
version = "1.0.0"
id = "artifacts/azam-service-desk"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25369

[services.development]
run = "pnpm --filter @workspace/azam-service-desk run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/azam-service-desk", "run", "build" ]
publicDir = "artifacts/azam-service-desk/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25369"
BASE_PATH = "/"
